<p>デバッグをするとき以下のように例外処理のブレイクポイントを書いて実行したとします。</p>
<pre><code class="language-language-ruby">begin
  nil.call
rescue StandardError
  binding.irb
end
</code></pre>
<p>ここでエラーオブジェクトの変数へのアサインを忘れていることに気づきました。</p>
<p>そんな時は<code>$!</code>を参照しましょう。</p>
<p><a href="https://docs.ruby-lang.org/ja/latest/method/Kernel/v/=21.html">Rubyの仕様</a>で直近の例外を参照することができます。</p>
